<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ポーカー管理 - KEYpro poker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nosifer&family=Work+Sans:wght@900&display=swap" rel="stylesheet">
<style>
  /* ==========================================================================
     ★★★ サイバー×高級感×重厚感のハイエンドUIデザイン ★★★
     ========================================================================== */
  *, *::before, *::after { box-sizing: border-box; }
  html, body { max-width: 100vw; overflow-x: hidden; scroll-behavior: smooth; -webkit-overflow-scrolling: touch; }
  
  /* 深淵なダークカーボン＆サイバーグリッド背景 */
  body { 
    background-color: #05070a;
    background-image: 
      radial-gradient(circle at 50% 50%, rgba(0, 240, 255, 0.03) 0%, transparent 60%),
      linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
    background-size: 100vw 100vh, 40px 40px, 40px 40px;
    color: #ffffff; text-align: center; margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; font-family: 'KEYpro', sans-serif; 
  }
  
  /* 重厚なガラスパネルコンテナ */
  .dashboard-container { 
    display: flex; flex-direction: column; width: 96vw; max-width: 1800px; height: 94vh; min-height: 600px; 
    background: linear-gradient(135deg, rgba(15, 20, 25, 0.85) 0%, rgba(5, 7, 10, 0.95) 100%);
    backdrop-filter: blur(10px);
    border-radius: 16px; 
    border: 1px solid rgba(212, 175, 55, 0.3); 
    box-shadow: 0 30px 80px rgba(0,0,0,1), inset 0 0 30px rgba(212, 175, 55, 0.05); 
    overflow: hidden; position: relative; 
  }

  /* サイバーなスキャンライン（画面全体に薄く走る線） */
  .dashboard-container::after {
    content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.1) 2px, rgba(0,0,0,0.1) 4px);
    pointer-events: none; z-index: 9999; opacity: 0.5;
  }

  .dashboard-main { display: flex; flex-direction: row; flex: 1; overflow: hidden; position: relative; z-index: 10; }

  .left-col { flex: 1; padding: 40px; display: flex; flex-direction: column; justify-content: center; align-items: center; border-right: 1px solid rgba(255,255,255,0.05); background: radial-gradient(circle at center, rgba(212,175,55,0.02) 0%, transparent 70%); }
  .right-col { flex: 1.5; padding: 40px; display: flex; flex-direction: column; overflow: hidden; background: rgba(0, 0, 0, 0.4); gap: 20px; }

  .suits { font-size: clamp(28px, 3.5vw, 50px); letter-spacing: 12px; margin-bottom: 10px; opacity: 0.8; margin-right: -12px; }
  .suit-red { color: #ff4757; text-shadow: 0 0 10px rgba(255, 71, 87, 0.5); }
  .suit-black { color: #ffffff; text-shadow: 0 0 10px rgba(255, 255, 255, 0.3); }
  
  h1 { font-family: 'Work Sans', sans-serif; color: #d4af37; font-size: clamp(50px, 6vw, 90px); margin: 0 -4px 15px 0; text-shadow: 0 0 20px rgba(212, 175, 55, 0.5), 0 5px 10px rgba(0,0,0,0.8); letter-spacing: -3px; font-weight: 900; }
  h1 span { font-family: 'KEYpro', sans-serif; color: #d4af37; font-size: clamp(14px, 1.5vw, 24px); margin-left: 10px; font-weight: normal; text-transform: uppercase; letter-spacing: 6px; vertical-align: middle; opacity: 0.8; }

  p.subtitle { font-size: clamp(14px, 1.5vw, 22px); margin-bottom: 40px; margin-right: -3px; color: #57606f; letter-spacing: 6px; text-transform: uppercase; font-weight: bold; }
  
  .date-header { font-size: clamp(20px, 2vw, 32px); font-weight: bold; color: #00f0ff; margin-bottom: 25px; background: rgba(0, 240, 255, 0.05); padding: 15px 40px; border-radius: 4px; border: 1px solid rgba(0, 240, 255, 0.2); letter-spacing: 3px; font-family: 'Courier New', monospace; box-shadow: 0 0 15px rgba(0, 240, 255, 0.1); }
  
  .timer-label { font-size: clamp(18px, 2vw, 28px); color: #7f8fa6; margin-bottom: 15px; letter-spacing: 4px; text-transform: uppercase; font-weight: bold; }
  /* タイマーはサイバーなシアンブルーに */
  .timer-display { background: #05070a; color: #00f0ff; font-family: 'Courier New', monospace; font-size: clamp(80px, 9vw, 150px); font-weight: bold; padding: 20px 40px; border-radius: 8px; border: 1px solid rgba(0, 240, 255, 0.3); text-shadow: 0 0 20px rgba(0, 240, 255, 0.6), 0 0 40px rgba(0, 240, 255, 0.2); box-shadow: inset 0 0 50px rgba(0,0,0,1), 0 0 20px rgba(0, 240, 255, 0.05); letter-spacing: 4px; }
  
  .board-title { color: #d4af37; font-size: clamp(20px, 2vw, 30px); letter-spacing: 6px; font-weight: bold; text-align: left; border-bottom: 1px solid rgba(212, 175, 55, 0.3); padding-bottom: 12px; text-transform: uppercase; display: flex; align-items: center; gap: 12px; margin-bottom: 15px; flex-shrink: 0; }
  /* サイバーな装飾 */
  .board-title::before { content: ''; display: inline-block; width: 4px; height: 20px; background-color: #d4af37; box-shadow: 0 0 15px #d4af37; }
  
  .live-ranking-list { display: flex; flex-direction: column; gap: 12px; width: 100%; flex-grow: 1; overflow-y: auto; padding-right: 20px; margin-bottom: 10px; position: relative; }
  .live-ranking-list::-webkit-scrollbar { width: 4px; }
  .live-ranking-list::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); }
  .live-ranking-list::-webkit-scrollbar-thumb { background: #800000; border-radius: 2px; }

  /* 🔴 ハザード（地獄）ランキング */
  .title-re-entry { font-family: 'Nosifer', sans-serif; color: #ff4757; -webkit-text-stroke: 1px #800000; letter-spacing: 4px; border-bottom-color: rgba(255, 71, 87, 0.3); animation: hazardPulse 4s ease-in-out infinite alternate; }
  .title-re-entry::before { background-color: #ff4757; box-shadow: 0 0 20px #ff4757; }
  .title-re-entry .title-skull { width: clamp(24px, 2.5vw, 36px); height: clamp(24px, 2.5vw, 36px); fill: #ff4757; margin-left: 15px; filter: drop-shadow(0 0 10px #ff0000); }

  .live-rank-card { display: flex; justify-content: flex-start; align-items: center; background: rgba(10, 5, 5, 0.9); border-left: 4px solid transparent; padding: clamp(15px, 2vw, 25px) clamp(20px, 3vw, 40px); border-radius: 0 8px 8px 0; box-shadow: 0 5px 15px rgba(0,0,0,0.8); flex-shrink: 0; transition: all 0.3s; position: relative; overflow: hidden; border: 1px solid rgba(255,0,0,0.1); }
  .live-rank-card .card-skull-bg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: clamp(120px, 15vw, 200px); height: clamp(120px, 15vw, 200px); fill: rgba(255, 255, 255, 0.02); z-index: 0; pointer-events: none; }

  .live-rank-card.worst-1 { border-left-color: #ff4500; background: linear-gradient(90deg, rgba(255, 69, 0, 0.15) 0%, rgba(10,0,0,0.9) 100%); border-color: rgba(255, 69, 0, 0.3); animation: hazardCard 3s ease-in-out infinite alternate; }
  .worst-1 .card-skull-bg { fill: rgba(255, 69, 0, 0.05); filter: drop-shadow(0 0 20px #ff4500); }
  .live-rank-card.worst-2 { border-left-color: #bf9b30; background: linear-gradient(90deg, rgba(191, 155, 48, 0.08) 0%, rgba(10,10,10,0.9) 100%); border-color: rgba(191, 155, 48, 0.15); }
  .live-rank-card.worst-3 { border-left-color: #a67c00; background: linear-gradient(90deg, rgba(166, 124, 0, 0.05) 0%, rgba(10,10,10,0.9) 100%); border-color: rgba(166, 124, 0, 0.1); }

  .rank-col { width: clamp(75px, 8vw, 120px); display: flex; align-items: center; justify-content: flex-start; z-index: 1; flex-shrink: 0; }
  .name-col { flex-grow: 1; text-align: left; padding-left: 15px; display: flex; flex-direction: column; gap: 6px; justify-content: center; z-index: 1; overflow: hidden; }
  .entry-col { width: clamp(100px, 12vw, 160px); display: flex; align-items: center; justify-content: flex-end; z-index: 1; flex-shrink: 0; text-align: right; }
  
  .rank-badge-text { font-family: 'Nosifer', sans-serif; font-size: clamp(34px, 3.5vw, 50px); font-weight: normal; color: transparent; -webkit-text-stroke: 1.5px #800000; letter-spacing: 2px; line-height: 1; }
  .worst-1 .rank-badge-text { font-size: clamp(40px, 4.5vw, 65px); -webkit-text-stroke-color: #ff4500; filter: drop-shadow(0 0 15px rgba(255, 69, 0, 0.8)); }
  .worst-2 .rank-badge-text { -webkit-text-stroke-color: #bf9b30; filter: drop-shadow(0 0 10px rgba(191, 155, 48, 0.5)); }
  .worst-3 .rank-badge-text { -webkit-text-stroke-color: #a67c00; filter: drop-shadow(0 0 8px rgba(166, 124, 0, 0.4)); }

  .player-name-item { font-size: clamp(18px, 2.2vw, 32px); font-weight: bold; color: #f1f2f6; letter-spacing: 3px; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .worst-1 .player-name-item { font-size: clamp(24px, 2.8vw, 40px); color: #ffffff; text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 0 0 15px #ff4500; }

  .entry-badge { display: flex; align-items: baseline; justify-content: flex-end; gap: 6px; width: 100%; }
  .entry-badge .num { font-family: 'Nosifer', sans-serif; font-size: clamp(32px, 3.5vw, 50px); font-weight: normal; line-height: 1; color: #7f8fa6; }
  .entry-badge .unit { font-size: clamp(14px, 1.5vw, 20px); color: #7f8fa6; font-weight: normal; letter-spacing: 2px; }

  .worst-1 .entry-badge .num { color: #ff4500; text-shadow: 0 0 20px rgba(255, 69, 0, 0.6); }
  .worst-2 .entry-badge .num { color: #bf9b30; text-shadow: 0 0 12px rgba(191, 155, 48, 0.5); }
  .worst-3 .entry-badge .num { color: #a67c00; text-shadow: 0 0 10px rgba(166, 124, 0, 0.4); }

  @keyframes hazardPulse { 0% { text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 0 0 10px rgba(255,71,87,0.5); } 100% { text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 0 0 20px rgba(255,71,87,1); } }
  @keyframes hazardCard { 0% { box-shadow: 0 5px 15px rgba(0,0,0,0.8), inset 0 0 10px rgba(255,69,0,0.1); } 100% { box-shadow: 0 5px 25px rgba(255,69,0,0.2), inset 0 0 20px rgba(255,69,0,0.2); } }

  /* 🟢 アクティブプレイヤーリスト（サイバーHUD仕様） */
  .title-active { color: #00f0ff; border-bottom-color: rgba(0, 240, 255, 0.3); text-shadow: 0 0 15px rgba(0, 240, 255, 0.4); margin-top: auto; }
  .title-active::before { background-color: #00f0ff; box-shadow: 0 0 15px #00f0ff; }

  .active-players-grid { display: flex; flex-wrap: wrap; gap: 15px; align-content: flex-start; max-height: 180px; overflow-y: auto; padding-right: 10px; flex-shrink: 0; }
  .active-players-grid::-webkit-scrollbar { width: 4px; }
  .active-players-grid::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); }
  .active-players-grid::-webkit-scrollbar-thumb { background: #00f0ff; border-radius: 2px; }

  /* 高度なHUD名札デザイン */
  .player-tag { 
    background: linear-gradient(135deg, rgba(15, 20, 25, 0.9) 0%, rgba(5, 10, 15, 0.95) 100%); 
    border: 1px solid rgba(255,255,255,0.05); 
    border-left: 3px solid #00f0ff; 
    padding: 10px 20px; 
    border-radius: 4px; 
    display: flex; flex-direction: column; gap: 4px; 
    box-shadow: 0 5px 15px rgba(0,0,0,0.6); 
    transition: all 0.3s; position: relative; 
  }
  .tag-header { display: flex; align-items: center; gap: 10px; }
  .tag-name { font-size: clamp(16px, 1.8vw, 24px); font-weight: bold; color: #ffffff; letter-spacing: 2px; text-transform: uppercase; }
  
  /* 追加：何位中何位のサイバーテキスト */
  .tag-rank { font-family: 'Courier New', monospace; font-size: clamp(10px, 1vw, 14px); color: #00f0ff; letter-spacing: 1px; opacity: 0.8; text-align: left; }
  
  .player-tag .status-dot { width: clamp(6px, 0.8vw, 10px); height: clamp(6px, 0.8vw, 10px); background: #00f0ff; border-radius: 50%; box-shadow: 0 0 10px #00f0ff; animation: hudBlink 2s infinite; }
  @keyframes hudBlink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

  /* VIP王冠＆カラー変更 */
  .crown-icon { width: clamp(18px, 1.8vw, 26px); height: clamp(18px, 1.8vw, 26px); margin-left: 6px; margin-top: -2px; }
  .crown-gold { fill: #f1c40f; filter: drop-shadow(0 0 8px rgba(241, 196, 15, 0.8)); }
  .crown-silver { fill: #bdc3c7; filter: drop-shadow(0 0 8px rgba(189, 195, 199, 0.8)); }
  .crown-bronze { fill: #cd7f32; filter: drop-shadow(0 0 8px rgba(205, 127, 50, 0.8)); }
  
  .vip-tag-1 { border-left-color: #f1c40f; border-color: rgba(241, 196, 15, 0.3); box-shadow: 0 5px 15px rgba(0,0,0,0.6), inset 0 0 15px rgba(241, 196, 15, 0.1); }
  .vip-tag-1 .tag-name { color: #f1c40f; text-shadow: 0 0 10px rgba(241, 196, 15, 0.3); }
  .vip-tag-1 .tag-rank { color: #f1c40f; }
  .vip-tag-1 .status-dot { background: #f1c40f; box-shadow: 0 0 10px #f1c40f; }

  .vip-tag-2 { border-left-color: #bdc3c7; border-color: rgba(189, 195, 199, 0.3); }
  .vip-tag-2 .tag-name { color: #bdc3c7; }
  .vip-tag-2 .tag-rank { color: #bdc3c7; }
  .vip-tag-2 .status-dot { background: #bdc3c7; box-shadow: 0 0 10px #bdc3c7; }

  .vip-tag-3 { border-left-color: #cd7f32; border-color: rgba(205, 127, 50, 0.3); }
  .vip-tag-3 .tag-name { color: #cd7f32; }
  .vip-tag-3 .tag-rank { color: #cd7f32; }
  .vip-tag-3 .status-dot { background: #cd7f32; box-shadow: 0 0 10px #cd7f32; }

  .empty-text { color: #57606f; font-size: clamp(16px, 1.5vw, 22px); width: 100%; text-align: center; margin-top: 20px; letter-spacing: 2px; line-height: 1.8; font-weight: bold; }
  .empty-text span { color: #d4af37; font-weight: bold; font-size: clamp(14px, 1.2vw, 20px); }
  
  .footer-text { position: absolute; bottom: 15px; left: 20px; font-size: 12px; color: #57606f; letter-spacing: 2px; text-transform: uppercase; z-index: 10; }
  .secret-btn { position: fixed; top: 15px; left: 15px; background: transparent; color: #57606f; border: none; font-size: 28px; cursor: pointer; padding: 10px; transition: color 0.3s; outline: none; z-index: 100; }
  .secret-btn:hover { color: #ffffff; }

  /* ナビゲーションボタン（サイバースタイル） */
  .nav-buttons { position: absolute; bottom: 30px; right: 30px; display: flex; gap: 20px; z-index: 50; }
  .discreet-btn { background: rgba(0, 0, 0, 0.8); color: #00f0ff; border: 1px solid rgba(0, 240, 255, 0.3); padding: 10px 25px; font-size: clamp(12px, 1.2vw, 16px); border-radius: 4px; text-decoration: none; letter-spacing: 3px; transition: all 0.3s ease; font-weight: bold; text-align: center; font-family: 'Courier New', monospace; box-shadow: 0 5px 15px rgba(0,0,0,0.8); text-transform: uppercase; }
  .discreet-btn:hover { background: #00f0ff; color: #000; box-shadow: 0 0 20px rgba(0, 240, 255, 0.6); transform: translateY(-2px); }

  .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; display: none; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
  .modal-content { background: #05070a; padding: 40px; border-radius: 8px; border: 1px solid #d4af37; text-align: center; width: 90%; max-width: 400px; box-shadow: 0 0 40px rgba(212,175,55,0.2); }
  .modal-content h3 { color: #d4af37; margin-top: 0; font-size: 20px; margin-bottom: 10px; letter-spacing: 3px; text-transform: uppercase; }
  .modal-content p { font-size: 14px; color: #7f8fa6; margin-bottom: 25px; letter-spacing: 1px; }
  #adminPass { width: 160px; padding: 15px; font-size: 42px; text-align: center; letter-spacing: 12px; border-radius: 4px; border: 1px solid #555; background: #000; color: #d4af37; margin-bottom: 30px; outline: none; transition: all 0.3s; font-family: 'Courier New', monospace; padding-left: 24px; }
  #adminPass:focus { border-color: #d4af37; box-shadow: 0 0 20px rgba(212, 175, 55, 0.4); }
  .modal-close-btn { background: transparent; color: #7f8fa6; border: 1px solid #555; padding: 12px 35px; border-radius: 50px; cursor: pointer; font-size: 14px; transition: all 0.3s; letter-spacing: 2px; text-transform: uppercase; }
  .modal-close-btn:hover { background: #ffffff; border-color: #ffffff; }

  /* 乱入演出 */
  .new-challenger-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0, 0, 0, 0); z-index: 10000; display: flex; flex-direction: column; justify-content: center; align-items: center; animation: flashBg 1s ease-out forwards; overflow: hidden; }
  @keyframes flashBg { 0% { background: rgba(0, 0, 0, 0); } 100% { background: rgba(0, 0, 0, 0.95); } }
  .new-challenger-title { color: #ff4757; font-family: 'Bangers', cursive; font-size: clamp(80px, 8vw, 150px); text-shadow: 4px 4px 0 #000, -2px -2px 0 #fff, 0 0 30px #ff4757; letter-spacing: 8px; margin-bottom: 10px; animation: scaleIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; z-index: 10001; opacity: 0; }
  .new-challenger-name { color: #ffffff; font-family: Impact, 'Arial Black', sans-serif; font-style: italic; font-size: clamp(70px, 7vw, 130px); text-transform: uppercase; letter-spacing: 8px; -webkit-text-stroke: 4px #000; text-shadow: 6px 6px 0 #d4af37, 12px 12px 0 #000, 0 0 50px rgba(212,175,55,0.8); animation: smashIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.3s forwards; opacity: 0; transform: translateY(50px) scale(0.9); z-index: 10001; text-align: center; padding: 0 20px; line-height: 1.1; }
  @keyframes scaleIn { 0% { transform: scale(1.2); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
  @keyframes smashIn { 0% { transform: translateY(50px) scale(0.9); opacity: 0; } 100% { transform: translateY(0) scale(1); opacity: 1; } }
  .particle { position: absolute; pointer-events: none; z-index: 10000; display: flex; justify-content: center; align-items: center; font-weight: bold; }
  @keyframes fall { 0% { top: -10vh; transform: rotate(0deg) scale(1); opacity: 1; } 100% { top: 110vh; transform: rotate(720deg) scale(1.2); opacity: 0; } }
  @keyframes explode { 0% { left: 50vw; top: 50vh; transform: translate(-50%, -50%) scale(0); opacity: 1; } 100% { left: var(--tx); top: var(--ty); transform: translate(-50%, -50%) scale(var(--s)); opacity: 0; } }

  /* 📱 スマホ用 */
  @media screen and (max-width: 900px) {
    body { padding: 10px; display: block; overflow-x: hidden; }
    .dashboard-container { flex-direction: column; height: auto; min-height: auto; border-radius: 8px; border-width: 1px; width: 100%; max-width: 100%; padding-bottom: 20px;}
    .dashboard-main { flex-direction: column; }
    .left-col { border-right: none; border-bottom: 1px solid rgba(255, 255, 255, 0.05); padding: 30px 15px; }
    .right-col { padding: 25px 15px; gap: 20px; background: rgba(0,0,0,0.6); }
    
    .suits { font-size: 32px; }
    h1 { font-size: 36px; } 
    .timer-display { font-size: 56px; padding: 10px 20px; margin-bottom: 10px; }
    .board-title { font-size: 18px; text-align: center; justify-content: center; margin-right: -4px; }
    .board-title::before { display: none; }
    .title-re-entry { letter-spacing: 1px; font-size: 16px; }
    .title-re-entry .title-skull { display: none; }
    .live-ranking-list { height: auto; padding-right: 0; }
    .live-rank-card { padding: 10px 15px; border-radius: 0 4px 4px 0; border-left-width: 3px; }
    .live-rank-card .card-skull-bg { width: 90px; height: 90px; }
    .rank-col { width: 55px; flex-shrink: 0; }
    .rank-badge-text { font-size: 26px; }
    .worst-1 .rank-badge-text { font-size: 30px; letter-spacing: 2px; }
    .name-col { padding-left: 10px; gap: 2px; overflow: hidden; }
    .player-name-item { font-size: 15px; }
    .worst-1 .player-name-item { font-size: 16px; }
    .entry-col { width: 85px; flex-shrink: 0; }
    .entry-badge .num { font-size: 24px; }
    .entry-badge .unit { font-size: 10px; }
    .title-active { margin-top: 10px; }
    .active-players-grid { justify-content: center; max-height: none; }
    
    .nav-buttons { position: static; justify-content: center; margin-top: 15px; margin-bottom: 20px; gap: 10px; }
    .discreet-btn { padding: 10px 15px; font-size: 11px; }
    .footer-text { position: static; text-align: center; margin-top: 10px; padding-bottom: 20px; }
    .secret-btn { top: auto; bottom: 15px; left: 15px; font-size: 24px; }
  }
</style>
</head>
<body>
  
  <div class="dashboard-container">
    <div class="dashboard-main">
      <div class="left-col">
        <div class="suits">
          <span class="suit-black">♠</span><span class="suit-red">♥</span><span class="suit-black">♣</span><span class="suit-red">♦</span>
        </div>
        <h1>KEYpro<span>poker</span></h1>
        <p class="subtitle">Official Dashboard</p>
        
        <div class="date-header" id="todayDate">----/--/--</div>
        
        <div class="timer-label">SESSION TIME</div>
        <div class="timer-display" id="mainTimer">00:00</div>
      </div>

      <div class="right-col">
        <div class="board-title title-re-entry">
          RE-ENTRY RANKING
          <svg class="title-skull" viewBox="0 0 448 512"><path d="M439.2 236.1l-20.1-11.9c-6.4-3.8-14.6-1.6-18.4 5.1-18.9 34.6-56.3 58.7-99.1 58.7-42.8 0-80.1-24.1-99.1-58.7-3.8-6.7-12-8.9-18.4-5.1l-20.1 11.9c-6.7 4-8.9 12.6-5 19.3C181.8 290.4 200.7 320 224 320s42.2-29.6 66.8-64.7c3.9-6.7 1.7-15.3-5-19.3zm-111.2-120c0-13.3-10.7-24-24-24s-24 10.7-24 24 10.7 24 24 24 24-10.7 24-24zm64 0c0-13.3-10.7-24-24-24s-24 10.7-24 24 10.7 24 24 24 24-10.7 24-24zM224 0C100.3 0 0 100.3 0 224v192c0 53 43 96 96 96h256c53 0 96-43 96-96V224C448 100.3 347.7 0 224 0zm96 416c0 17.7-14.3 32-32 32s-32-14.3-32-32 14.3-32 32-32 32 14.3 32 32zm-128 0c0 17.7-14.3 32-32 32s-32-14.3-32-32 14.3-32 32-32 32 14.3 32 32zm160-224C352 110.3 294.5 48 224 48s-128 62.3-128 144v14.1c0 23.6 15.1 44.8 36.9 52.8l10.8 4c16.3 6 30.1 16.6 39.4 30.2 11.2-16.1 27.6-29 46.9-36l10.8-4c21.8-8 36.9-29.2 36.9-52.8V192zm-32 96c-17.7 0-32 14.3-32 32s14.3 32 32 32 32-14.3 32-32-14.3-32-32-32zm-128 0c-17.7 0-32 14.3-32 32s14.3 32 32 32 32-14.3 32-32-14.3-32-32-32z"/></svg>
        </div>
        <div id="topLiveBoard" class="live-ranking-list">
          <div class="empty-text">現在リエントリー中のプレイヤーはいません<br><span>🕊 ALL PLAYERS SURVIVING</span></div>
        </div>

        <div class="board-title title-active">ACTIVE PLAYERS</div>
        <div id="activePlayersBoard" class="active-players-grid">
          <div class="empty-text">現在プレイ中の参加者はいません</div>
        </div>
      </div>
    </div>
    
    <div class="nav-buttons">
      <a href="ranking.html" class="discreet-btn">HALL OF FAME</a>
      <a href="rules.html" class="discreet-btn">HOW TO PLAY</a>
    </div>
  </div>

  <div class="footer-text">© 2026 KEYpro poker Server</div>
  
  <button class="secret-btn" onclick="showPasswordModal()">⚙</button>

  <div id="passModal" class="modal-overlay">
    <div class="modal-content">
      <h3>HOST AUTHENTICATION</h3>
      <p>ENTER 4-DIGIT PIN</p>
      <input type="password" id="adminPass" maxlength="4" inputmode="numeric" pattern="[0-9]*" autocomplete="off">
      <br>
      <button class="modal-close-btn" onclick="closeModal()">CANCEL</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDWO4bFy5lAHALlnKr32b9TTTXNcNQuIqU",
      authDomain: "keypro-poker-server.firebaseapp.com",
      projectId: "keypro-poker-server",
      storageBucket: "keypro-poker-server.firebasestorage.app",
      messagingSenderId: "953048452758",
      appId: "1:953048452758:web:16aa168ae600cc97e67cb7",
      measurementId: "G-3HVG0EP54D"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxijPOgmKGDL-UL5eAqOBKrxKVfPl4v6hsdLcWbiuwMrCWSPI5fqxu3qOmXIFTrMYCi5A/exec";

    let displayedNames = [];
    let pendingNames = [];
    let isFirstLoad = true;
    let latestData = []; 
    
    // ★ 歴代全プレイヤーのランキング情報を保持する変数
    let top3Players = {};
    let allTimeRanks = {};
    let totalAllTimePlayers = 0;

    // ★ 歴代ランキング情報を取得
    fetch(GAS_URL, { redirect: 'follow' })
      .then(res => res.json())
      .then(players => {
        if (players && players.length > 0) {
          totalAllTimePlayers = players.length;
          players.forEach((p, index) => {
            allTimeRanks[p.name] = index + 1; // 1位からの順位を保存
          });
          if(players[0]) top3Players[players[0].name] = 1;
          if(players[1]) top3Players[players[1].name] = 2;
          if(players[2]) top3Players[players[2].name] = 3;
          if(latestData.length > 0) renderBoard(latestData);
        }
      })
      .catch(e => console.error("HOF Load Error", e));

    function triggerNewChallenger(playerName) {
      const container = document.createElement('div');
      container.className = 'new-challenger-overlay';
      const title = document.createElement('div');
      title.className = 'new-challenger-title';
      title.innerText = 'NEW CHALLENGER!';
      const nameDiv = document.createElement('div');
      nameDiv.className = 'new-challenger-name';
      nameDiv.innerText = playerName + '\nJOINED!';
      
      container.appendChild(title);
      container.appendChild(nameDiv);
      document.body.appendChild(container);

      const effectPatterns = [
        { type: 'chip', anim: 'fall' }, { type: 'card', anim: 'fall' }, { type: 'gold', anim: 'fall' }, 
        { type: 'laser', anim: 'fall' }, { type: 'confetti', anim: 'fall' }, { type: 'slot', anim: 'fall' }
      ];
      const effect = effectPatterns[Math.floor(Math.random() * effectPatterns.length)];
      const count = window.innerWidth < 600 ? 30 : 70; 
      const colors = ['#e74c3c', '#00f0ff', '#f1c40f', '#2ecc71', '#9b59b6', '#ffffff'];
      const suits = ['♠', '♥', '♣', '♦'];
      const slots = ['7', 'BAR', '🍒', '🔔', '💎'];

      for (let i = 0; i < count; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        let dur = Math.random() * 3 + 3; 
        let delay = Math.random() * 0.5;
        p.style.left = (Math.random() * 100) + 'vw';
        p.style.setProperty('--tx', (Math.random() * 100) + 'vw');
        p.style.setProperty('--ty', (Math.random() * 100) + 'vh');
        p.style.setProperty('--s', Math.random() * 2 + 1);

        if (effect.type === 'chip') {
          p.style.width = '50px'; p.style.height = '50px'; p.style.borderRadius = '50%';
          p.style.border = '4px dashed rgba(255,255,255,0.7)'; p.style.background = colors[Math.floor(Math.random() * colors.length)];
          p.innerText = suits[Math.floor(Math.random() * suits.length)]; p.style.color = '#fff'; p.style.fontSize = '20px'; p.style.boxShadow = '0 5px 10px rgba(0,0,0,0.5)';
        } else if (effect.type === 'card') {
          p.style.width = '40px'; p.style.height = '60px'; p.style.background = '#fff'; p.style.borderRadius = '4px';
          let suit = suits[Math.floor(Math.random() * suits.length)]; p.innerText = suit; p.style.color = (suit === '♥' || suit === '♦') ? '#e74c3c' : '#2c3e50';
          p.style.fontSize = '24px'; p.style.border = '1px solid #ccc';
        } else if (effect.type === 'gold') {
          if (Math.random() > 0.5) { p.style.width = '40px'; p.style.height = '40px'; p.style.borderRadius = '50%'; p.style.background = 'radial-gradient(circle, #f1c40f, #d35400)'; p.innerText = '¥'; p.style.color = '#fff'; p.style.fontSize = '20px';
          } else { p.style.width = '50px'; p.style.height = '25px'; p.style.background = '#27ae60'; p.style.borderRadius = '2px'; p.innerText = '$'; p.style.color = '#fff'; }
        } else if (effect.type === 'confetti') { p.style.width = '15px'; p.style.height = '15px'; p.style.background = colors[Math.floor(Math.random() * colors.length)]; dur = Math.random() * 4 + 3; 
        } else if (effect.type === 'slot') { p.innerText = slots[Math.floor(Math.random() * slots.length)]; p.style.fontSize = '45px';
        } else if (effect.type === 'laser') { p.style.width = '4px'; p.style.height = '150px'; p.style.background = colors[Math.floor(Math.random() * colors.length)]; p.style.boxShadow = '0 0 20px ' + p.style.background; dur = Math.random() * 1 + 0.5; }
        
        p.style.animation = `${effect.anim} ${dur}s linear ${delay}s forwards`;
        container.appendChild(p);
      }
      setTimeout(() => { container.style.opacity = '0'; container.style.transition = 'opacity 1s ease'; setTimeout(() => container.remove(), 1000); }, 5000);
    }

    function renderBoard(data) {
      const playersBoard = document.getElementById('activePlayersBoard');
      const rankingBoard = document.getElementById('topLiveBoard');
      
      let activePlayers = [];
      let reEntryPlayers = [];

      data.forEach(player => {
        if (player.name && player.name.trim() !== "" && displayedNames.includes(player.name) && player.entry > 0) { 
          activePlayers.push({ name: player.name });
          if (player.entry > 1) {
            reEntryPlayers.push({ name: player.name, reEntry: player.entry - 1 });
          }
        }
      });

      if (reEntryPlayers.length === 0) {
        const emptyHtml = '<div class="empty-text">現在リエントリー中のプレイヤーはいません<br><span>🕊 ALL PLAYERS SURVIVING</span></div>';
        if (rankingBoard.dataset.state !== emptyHtml) {
          rankingBoard.innerHTML = emptyHtml;
          rankingBoard.dataset.state = emptyHtml;
        }
      } else {
        let groups = {};
        reEntryPlayers.forEach(p => {
          let key = p.reEntry; 
          if (!groups[key]) { groups[key] = { reEntry: p.reEntry, names: [] }; }
          groups[key].names.push(p.name);
        });

        let groupArray = Object.values(groups);
        groupArray.sort((a, b) => b.reEntry - a.reEntry);

        let html = '';
        groupArray.forEach((group, index) => {
          let rankStr = String(index + 1).padStart(2, '0');
          let rankClass = "worst-other";
          if (index === 0) { rankClass = "worst-1"; }
          else if (index === 1) { rankClass = "worst-2"; }
          else if (index === 2) { rankClass = "worst-3"; }

          let namesHtml = group.names.map(name => `<div class="player-name-item">${name}</div>`).join('');
          let entryText = `<span class="num">${group.reEntry}</span><span class="unit">RE</span>`;

          html += `
            <div class="live-rank-card ${rankClass}">
              <svg class="card-skull-bg" viewBox="0 0 448 512"><path d="M439.2 236.1l-20.1-11.9c-6.4-3.8-14.6-1.6-18.4 5.1-18.9 34.6-56.3 58.7-99.1 58.7-42.8 0-80.1-24.1-99.1-58.7-3.8-6.7-12-8.9-18.4-5.1l-20.1 11.9c-6.7 4-8.9 12.6-5 19.3C181.8 290.4 200.7 320 224 320s42.2-29.6 66.8-64.7c3.9-6.7 1.7-15.3-5-19.3zm-111.2-120c0-13.3-10.7-24-24-24s-24 10.7-24 24 10.7 24 24 24 24-10.7 24-24zm64 0c0-13.3-10.7-24-24-24s-24 10.7-24 24 10.7 24 24 24 24-10.7 24-24zM224 0C100.3 0 0 100.3 0 224v192c0 53 43 96 96 96h256c53 0 96-43 96-96V224C448 100.3 347.7 0 224 0zm96 416c0 17.7-14.3 32-32 32s-32-14.3-32-32 14.3-32 32-32 32 14.3 32 32zm-128 0c0 17.7-14.3 32-32 32s-32-14.3-32-32 14.3-32 32-32 32 14.3 32 32zm160-224C352 110.3 294.5 48 224 48s-128 62.3-128 144v14.1c0 23.6 15.1 44.8 36.9 52.8l10.8 4c16.3 6 30.1 16.6 39.4 30.2 11.2-16.1 27.6-29 46.9-36l10.8-4c21.8-8 36.9-29.2 36.9-52.8V192zm-32 96c-17.7 0-32 14.3-32 32s14.3 32 32 32 32-14.3 32-32-14.3-32-32-32zm-128 0c-17.7 0-32 14.3-32 32s14.3 32 32 32 32-14.3 32-32-14.3-32-32-32z"/></svg>
              <div class="rank-col"><div class="rank-badge-text">${rankStr}</div></div>
              <div class="name-col">${namesHtml}</div>
              <div class="entry-col"><div class="entry-badge">${entryText}</div></div>
            </div>
          `;
        });
        if (rankingBoard.dataset.state !== html) {
          rankingBoard.innerHTML = html;
          rankingBoard.dataset.state = html;
        }
      }

      if (activePlayers.length === 0) {
        const emptyHtml = '<div class="empty-text">現在プレイ中の参加者はいません</div>';
        if (playersBoard.dataset.state !== emptyHtml) {
          playersBoard.innerHTML = emptyHtml;
          playersBoard.dataset.state = emptyHtml;
        }
      } else {
        let playersHtml = '';
        activePlayers.forEach(p => {
          let crownSvg = '';
          let tagClass = 'player-tag';
          
          if (top3Players[p.name] === 1) {
              crownSvg = `<svg class="crown-icon crown-gold" viewBox="0 0 512 512"><path d="M493.4 24.6l-104 192C385.6 224.2 376.5 229 366.1 226.7l-94.2-20.9L288 32c0-17.7-14.3-32-32-32s-32 14.3-32 32l16.1 173.8-94.2 20.9c-10.3 2.3-19.4-2.5-23.2-10.1l-104-192C15.4 10.3 4.2 13 1 24.6c-3.2 11.6 2 24 13.5 28.5L128 100.9l-11.2 266c-.6 13.5 10 25.1 23.5 25.1h231.4c13.5 0 24.1-11.6 23.5-25.1l-11.2-266 113.5-47.8c11.5-4.5 16.7-16.9 13.5-28.5c-3.2-11.6-14.4-14.3-18.1-10.1zM80 448c0-17.7 14.3-32 32-32h288c17.7 0 32 14.3 32 32s-14.3 32-32 32H112c-17.7 0-32-14.3-32-32z"/></svg>`;
              tagClass += ' vip-tag-1';
          } else if (top3Players[p.name] === 2) {
              crownSvg = `<svg class="crown-icon crown-silver" viewBox="0 0 512 512"><path d="M493.4 24.6l-104 192C385.6 224.2 376.5 229 366.1 226.7l-94.2-20.9L288 32c0-17.7-14.3-32-32-32s-32 14.3-32 32l16.1 173.8-94.2 20.9c-10.3 2.3-19.4-2.5-23.2-10.1l-104-192C15.4 10.3 4.2 13 1 24.6c-3.2 11.6 2 24 13.5 28.5L128 100.9l-11.2 266c-.6 13.5 10 25.1 23.5 25.1h231.4c13.5 0 24.1-11.6 23.5-25.1l-11.2-266 113.5-47.8c11.5-4.5 16.7-16.9 13.5-28.5c-3.2-11.6-14.4-14.3-18.1-10.1zM80 448c0-17.7 14.3-32 32-32h288c17.7 0 32 14.3 32 32s-14.3 32-32 32H112c-17.7 0-32-14.3-32-32z"/></svg>`;
              tagClass += ' vip-tag-2';
          } else if (top3Players[p.name] === 3) {
              crownSvg = `<svg class="crown-icon crown-bronze" viewBox="0 0 512 512"><path d="M493.4 24.6l-104 192C385.6 224.2 376.5 229 366.1 226.7l-94.2-20.9L288 32c0-17.7-14.3-32-32-32s-32 14.3-32 32l16.1 173.8-94.2 20.9c-10.3 2.3-19.4-2.5-23.2-10.1l-104-192C15.4 10.3 4.2 13 1 24.6c-3.2 11.6 2 24 13.5 28.5L128 100.9l-11.2 266c-.6 13.5 10 25.1 23.5 25.1h231.4c13.5 0 24.1-11.6 23.5-25.1l-11.2-266 113.5-47.8c11.5-4.5 16.7-16.9 13.5-28.5c-3.2-11.6-14.4-14.3-18.1-10.1zM80 448c0-17.7 14.3-32 32-32h288c17.7 0 32 14.3 32 32s-14.3 32-32 32H112c-17.7 0-32-14.3-32-32z"/></svg>`;
              tagClass += ' vip-tag-3';
          }

          // ★ 何位中何位のテキストを生成
          let rankTextHtml = '';
          if (allTimeRanks[p.name]) {
            rankTextHtml = `<div class="tag-rank">ALL-TIME RANK: ${allTimeRanks[p.name]} / ${totalAllTimePlayers}</div>`;
          } else {
            rankTextHtml = `<div class="tag-rank">ALL-TIME RANK: NEW PLAYER</div>`;
          }

          // ★ サイバーHUD風の構造で出力
          playersHtml += `
            <div class="${tagClass}">
              <div class="tag-header">
                <span class="status-dot"></span>
                <span class="tag-name">${p.name}</span>
                ${crownSvg}
              </div>
              ${rankTextHtml}
            </div>
          `;
        });
        if (playersBoard.dataset.state !== playersHtml) {
          playersBoard.innerHTML = playersHtml;
          playersBoard.dataset.state = playersHtml;
        }
      }
    }

    let currentTimerState = { running: false, elapsedSeconds: 0, lastUpdate: Date.now() };
    onValue(ref(db, 'pokerSession/timer'), (snapshot) => {
      const data = snapshot.val();
      if (data) currentTimerState = data;
    });

    setInterval(() => {
      let currentElapsed = currentTimerState.elapsedSeconds;
      if (currentTimerState.running) {
        const elapsedSinceUpdate = Math.floor((Date.now() - currentTimerState.lastUpdate) / 1000);
        currentElapsed += elapsedSinceUpdate;
      }
      const h = Math.floor(currentElapsed / 3600);
      const m = Math.floor((currentElapsed % 3600) / 60);
      const s = currentElapsed % 60;
      
      const newTimerText = (h > 0 ? String(h).padStart(2, '0') + ':' : '') + String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
      const timerDisplay = document.getElementById('mainTimer');
      if (timerDisplay.innerText !== newTimerText) timerDisplay.innerText = newTimerText;
    }, 1000);

    onValue(ref(db, 'pokerSession/players'), (snapshot) => {
      latestData = snapshot.val() || [];
      
      if (isFirstLoad) {
        latestData.forEach(p => {
          if (p.name && p.name.trim() !== "") {
            displayedNames.push(p.name);
          }
        });
        isFirstLoad = false;
        renderBoard(latestData);
        return;
      }

      latestData.forEach(p => {
        let name = p.name ? p.name.trim() : "";
        if (name !== "" && p.entry > 0) {
          if (!displayedNames.includes(name) && !pendingNames.includes(name)) {
            pendingNames.push(name);
            
            setTimeout(() => {
              pendingNames = pendingNames.filter(n => n !== name);
              const stillExists = latestData.some(player => player.name === name);
              if (stillExists) {
                if (!displayedNames.includes(name)) {
                  displayedNames.push(name);
                }
                triggerNewChallenger(name); 
                renderBoard(latestData);
              }
            }, 60000); 
          }
        }
      });

      renderBoard(latestData);
    });

    const now = new Date();
    document.getElementById('todayDate').innerText = now.getFullYear() + "/" + String(now.getMonth() + 1).padStart(2, '0') + "/" + String(now.getDate()).padStart(2, '0');

    window.showPasswordModal = function() {
      const modal = document.getElementById('passModal');
      const input = document.getElementById('adminPass');
      modal.style.display = 'flex';
      input.value = '';
      input.focus(); 
    };

    window.closeModal = function() {
      document.getElementById('passModal').style.display = 'none';
    };

    document.getElementById('adminPass').addEventListener('input', function(e) {
      if (this.value.length === 4) {
        if (this.value === "5424") {
          location.href = 'calc.html';
        } else {
          alert("INCORRECT PIN");
          this.value = '';
        }
      }
    });
  </script>
</body>
