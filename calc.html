<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>チップ精算 - KEYpro poker Server</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  /* 全体の設定（横揺れを完全にロック） */
  *, *::before, *::after { box-sizing: border-box; }
  html, body { max-width: 100vw; overflow-x: hidden; }

  body, input, button, table, th, td, h2, div { font-family: 'KEYpro', sans-serif; }
  body { background: radial-gradient(circle at center, #1a5c38 0%, #0a2e1c 100%); color: #ffffff; padding: 15px; margin: 0; min-height: 100vh; }
  
  .container { width: 100%; max-width: 900px; margin: 0 auto; background-color: rgba(0, 0, 0, 0.7); padding: 25px 20px; border-radius: 16px; border: 2px solid #d4af37; box-shadow: 0 10px 40px rgba(0,0,0,0.7); }
  
  h2 { color: #d4af37; margin-top: 0; margin-bottom: 20px; font-size: 24px; border-bottom: 2px solid #d4af37; padding-bottom: 15px; text-shadow: 0px 4px 10px rgba(0,0,0,0.8); letter-spacing: 3px; text-align: center; font-weight: bold; }

  .timer-control { background: rgba(0, 0, 0, 0.4); border: 1px solid #7f8c8d; border-radius: 12px; padding: 20px; margin-bottom: 30px; display: flex; flex-direction: column; align-items: center; box-shadow: inset 0 0 20px rgba(0,0,0,0.5); }
  .timer-control-title { color: #bdc3c7; font-size: 14px; margin-bottom: 12px; letter-spacing: 1px; }
  .timer-display-small { font-family: 'Courier New', monospace; font-size: 38px; font-weight: bold; color: #2ecc71; margin-bottom: 20px; text-shadow: 0 0 15px rgba(46,204,113,0.5); }
  .timer-btns { display: flex; gap: 12px; width: 100%; justify-content: center; max-width: 400px; }
  .t-btn { padding: 12px 0; border: 1px solid rgba(255,255,255,0.2); border-radius: 50px; font-weight: bold; cursor: pointer; color: #fff; font-size: 14px; flex: 1; transition: all 0.2s; outline: none; }
  .btn-start { background: linear-gradient(145deg, #27ae60, #2ecc71); box-shadow: 0 4px 10px rgba(39, 174, 96, 0.3); }
  .btn-stop { background: linear-gradient(145deg, #d35400, #e67e22); box-shadow: 0 4px 10px rgba(211, 84, 0, 0.3); }
  .btn-reset { background: linear-gradient(145deg, #7f8c8d, #95a5a6); box-shadow: 0 4px 10px rgba(127, 140, 141, 0.3); }
  .t-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 15px rgba(0,0,0,0.5); }

  .table-wrapper { width: 100%; margin-bottom: 25px; overflow-x: auto; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
  table { width: 100%; border-collapse: collapse; background-color: rgba(255, 255, 255, 0.03); min-width: 600px; }
  th, td { border-bottom: 1px solid rgba(255, 255, 255, 0.08); padding: 15px 10px; text-align: center; }
  th { background-color: #1a252f; color: #d4af37; font-size: 14px; white-space: nowrap; font-weight: bold; letter-spacing: 1px; }
  
  input { width: 100%; padding: 12px; text-align: right; font-size: 16px; border: 1px solid #555; border-radius: 8px; background-color: rgba(0, 0, 0, 0.6); color: #fff; transition: all 0.2s; outline: none; }
  input:focus { border-color: #d4af37; background-color: rgba(0, 0, 0, 0.9); box-shadow: 0 0 10px rgba(212, 175, 55, 0.3); }
  input[type="text"].name-input { text-align: left; }
  
  .readonly { background-color: transparent; border: none; font-weight: bold; color: #bdc3c7; text-align: right; padding-right: 0; font-size: 15px; }
  
  .del-btn { background-color: transparent; color: #e74c3c; border: 1px solid #e74c3c; padding: 7px 12px; border-radius: 20px; cursor: pointer; font-size: 12px; white-space: nowrap; transition: all 0.3s; }
  .del-btn:hover { background-color: #e74c3c; color: #fff; }
  
  .btn-group { display: flex; flex-direction: column; gap: 15px; margin-top: 30px; }
  .btn { display: block; width: 100%; border-radius: 50px; cursor: pointer; transition: all 0.3s; font-weight: bold; text-align: center; text-decoration: none; outline: none; }
  .add-btn { background: rgba(255,255,255,0.05); color: #fff; border: 1px solid #7f8c8d; padding: 15px; font-size: 15px; }
  .save-btn { background: linear-gradient(145deg, #bf953f, #b38728); color: #fff; border: 1px solid #fcf6ba; font-size: 18px; padding: 18px; position: relative; overflow: hidden; box-shadow: 0 5px 15px rgba(184, 134, 11, 0.4); text-shadow: 1px 1px 2px rgba(0,0,0,0.6); }
  .save-btn:disabled { background: #95a5a6; border-color: #7f8c8d; cursor: not-allowed; }
  .back-btn { background: transparent; border: 1px solid #ecf0f1; margin-top: 20px; color: #ecf0f1; padding: 15px; font-size: 15px; }
  
  .summary { margin-top: 30px; font-size: 20px; font-weight: bold; color: #fff; background: rgba(0,0,0,0.5); padding: 20px; border-radius: 12px; border: 2px solid #d4af37; text-align: left; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
  .total-label { color: #d4af37; font-size: 16px; margin-right: 10px; }
  .status-badge { font-size: 14px; padding: 5px 15px; border-radius: 20px; font-weight: normal; }
  .match .status-badge { background-color: rgba(46, 204, 113, 0.2); color: #2ecc71; border: 1px solid #2ecc71; }
  .error .status-badge { background-color: rgba(231, 76, 60, 0.2); color: #e74c3c; border: 1px solid #e74c3c; animation: pulse 2s infinite; }
  @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(231, 76, 60, 0); } 100% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0); } }

  .draft-notice { font-size: 14px; color: #f1c40f; margin-top: 15px; text-align: center; letter-spacing: 1px; font-weight: bold; }

  /* ★★★ カスタム電卓（テンキー）のデザイン ★★★ */
  .numpad-overlay {
    position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
    background: rgba(0,0,0,0.6); z-index: 9998; display: none; backdrop-filter: blur(2px);
  }
  .numpad-overlay.show { display: block; }
  
  .custom-numpad {
    position: fixed; bottom: -100%; left: 0; width: 100vw;
    background: #111; z-index: 9999; 
    transition: bottom 0.3s cubic-bezier(0.175, 0.885, 0.32, 1);
    border-top: 2px solid #d4af37; box-shadow: 0 -10px 40px rgba(0,0,0,0.9);
    padding-bottom: env(safe-area-inset-bottom);
  }
  .custom-numpad.show { bottom: 0; }
  
  .numpad-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: #333;
  }
  .numpad-btn {
    background: #000; color: #fff; border: none; font-size: 26px; padding: 22px 0;
    font-family: 'Courier New', monospace; font-weight: bold; cursor: pointer; outline: none;
    transition: background 0.1s;
  }
  .numpad-btn:active { background: #333; }
  .numpad-btn.action { background: #1a252f; color: #e74c3c; font-size: 24px; }
  .numpad-btn.done { 
    background: linear-gradient(145deg, #bf953f, #b38728); 
    color: #fff; font-family: 'KEYpro', sans-serif; font-size: 20px; letter-spacing: 2px; 
  }
  .numpad-btn.done:active { filter: brightness(0.8); }

  /* 入力中（アクティブ）の入力欄のエフェクト */
  input.numpad-trigger { cursor: pointer; caret-color: transparent; font-size: 20px; font-weight: bold; }
  input.numpad-active {
    background-color: rgba(212, 175, 55, 0.15) !important;
    border-color: #d4af37 !important;
    box-shadow: 0 0 15px rgba(212, 175, 55, 0.5) !important;
    color: #d4af37 !important;
  }

  /* 📱 スマホ向け（絶対にはみ出さない縦型アプリレイアウト） */
  @media screen and (max-width: 600px) {
    body { padding: 10px 5px; }
    .container { padding: 20px 15px; border-radius: 12px; }
    h2 { font-size: 20px; letter-spacing: 2px; margin-bottom: 20px; }
    
    .table-wrapper { overflow: hidden; box-shadow: none; background: transparent; margin-bottom: 10px; }
    table { min-width: 0 !important; width: 100%; border: none; }
    table, thead, tbody, tr, td { display: block; }
    thead { display: none; }
    
    tr { background: linear-gradient(145deg, rgba(20, 25, 30, 0.9), rgba(0, 0, 0, 0.9)); margin-bottom: 20px; border-radius: 12px; border: 1px solid rgba(212, 175, 55, 0.4); padding: 15px 15px 55px 15px; position: relative; box-shadow: 0 6px 15px rgba(0,0,0,0.5); }
    td { padding: 8px 0; border: none; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px dashed rgba(255, 255, 255, 0.1); }
    td:nth-last-child(2) { border-bottom: none; }
    
    td[data-label="名前"] { flex-direction: column; align-items: flex-start; border-bottom: 1px solid rgba(212, 175, 55, 0.3); padding-bottom: 15px; margin-bottom: 10px; }
    td[data-label="名前"]::before { width: 100%; color: #d4af37; margin-bottom: 8px; font-size: 14px; letter-spacing: 1px; }
    td[data-label="名前"] input { width: 100%; font-size: 18px; padding: 12px; background: rgba(255,255,255,0.05); }

    td:not([data-label="名前"])::before { content: attr(data-label); color: #bdc3c7; font-size: 13px; width: 40%; flex-shrink: 0; font-weight: bold; text-align: left; }
    td:not([data-label="名前"]) input { width: 60%; flex-grow: 1; padding: 10px; text-align: right; min-width: 0; }
    td:not([data-label="名前"]) .readonly { width: 60%; text-align: right; font-size: 16px; color: #fff; padding: 8px 5px; font-weight: bold; }

    td:last-child { position: absolute; bottom: 12px; right: 15px; padding: 0; display: block; width: auto; border: none; }
    td:last-child::before { display: none; }
    .del-btn { padding: 8px 25px; font-size: 13px; border-radius: 50px; background: rgba(231, 76, 60, 0.1); }
    
    .timer-display-small { font-size: 42px; }
    .timer-btns .t-btn { padding: 12px 5px; font-size: 12px; }
    .summary { flex-direction: column; align-items: flex-start; gap: 12px; font-size: 16px; padding: 15px; }
    #totalPay { font-size: 26px !important; }
    .save-btn { font-size: 16px; padding: 16px; margin-top: 10px; }
    
    .numpad-btn { padding: 18px 0; font-size: 24px; }
  }

  /* ★★★ 画像生成用エリア ★★★ */
  #reportArea { position: absolute; top: -9999px; left: -9999px; width: 1200px; height: 675px; background: radial-gradient(circle at center, #1a5c38 0%, #0a2e1c 100%); color: #ffffff; padding: 40px; box-sizing: border-box; display: flex; flex-direction: column; border: 10px solid #d4af37; }
  .report-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid #d4af37; padding-bottom: 20px; margin-bottom: 20px; }
  .report-title { font-size: 48px; color: #d4af37; font-weight: bold; letter-spacing: 5px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
  .report-suits { font-size: 32px; letter-spacing: 10px; }
  .report-red { color: #e74c3c; }
  .report-meta { font-size: 20px; color: #bdc3c7; text-align: right; line-height: 1.6; }
  .report-table { width: 100%; border-collapse: collapse; flex-grow: 1; margin-bottom: 20px; }
  .report-table th, .report-table td { border: 1px solid rgba(255,255,255,0.1); padding: 10px; text-align: center; font-size: 18px; }
  .report-table th { background-color: #1a252f; color: #d4af37; font-weight: bold; }
  .report-table td.name-cell { text-align: left; font-weight: bold; }
  .report-table td.pay-cell { font-weight: bold; font-size: 22px; }
  .report-plus { color: #2ecc71; }
  .report-minus { color: #e74c3c; }
  .report-footer { display: flex; justify-content: space-between; align-items: center; font-size: 18px; color: #7f8c8d; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 15px; }
</style>
</head>
<body>

  <div class="container">
    <h2>チップ清算</h2>

    <div class="timer-control">
      <div class="timer-control-title">⏱️ プレイ時間タイマー (全画面連動)</div>
      <div id="controlTimer" class="timer-display-small">00:00</div>
      <div class="timer-btns">
        <button class="t-btn btn-start" onclick="window.timerAction('start')">▶ START</button>
        <button class="t-btn btn-stop" onclick="window.timerAction('stop')">⏸ STOP</button>
        <button class="t-btn btn-reset" onclick="window.timerAction('reset')">🔄 RESET</button>
      </div>
    </div>

    <div class="table-wrapper">
      <table id="calcTable">
        <thead>
          <tr>
            <th>プレイヤー名</th>
            <th>エントリー</th>
            <th>最終持ち点</th>
            <th>精算後 (点)</th>
            <th>Pay</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="tableBody">
        </tbody>
      </table>
    </div>

    <div class="summary" id="checkResult">
      <div><span class="total-label">合計 Pay:</span> <span id="totalPay" style="font-size: 24px;">0</span></div>
      <div id="statusMessage" class="match"><span class="status-badge">✨ 確認済 (誤差なし)</span></div>
    </div>
    
    <div class="draft-notice">🔄 全員の画面とリアルタイム同期中...</div>

    <div class="btn-group">
      <button class="btn add-btn" onclick="window.addRow()">+ プレイヤー行を追加</button>
      <button class="btn save-btn" id="saveBtn" onclick="window.confirmAndSave()">💾 成績を確定・記録する</button>
      <button class="btn back-btn" onclick="location.href='index.html'">◀ トップページへ戻る</button>
    </div>
  </div>

  <div id="numpadOverlay" class="numpad-overlay" onclick="window.closeCustomNumpad()"></div>
  <div id="customNumpad" class="custom-numpad">
    <div class="numpad-grid">
      <button class="numpad-btn" onclick="window.numpadType('1')">1</button>
      <button class="numpad-btn" onclick="window.numpadType('2')">2</button>
      <button class="numpad-btn" onclick="window.numpadType('3')">3</button>
      <button class="numpad-btn action" onclick="window.numpadDel()">⌫</button>

      <button class="numpad-btn" onclick="window.numpadType('4')">4</button>
      <button class="numpad-btn" onclick="window.numpadType('5')">5</button>
      <button class="numpad-btn" onclick="window.numpadType('6')">6</button>
      <button class="numpad-btn action" onclick="window.numpadClear()">C</button>

      <button class="numpad-btn" onclick="window.numpadType('7')">7</button>
      <button class="numpad-btn" onclick="window.numpadType('8')">8</button>
      <button class="numpad-btn" onclick="window.numpadType('9')">9</button>
      <button class="numpad-btn" onclick="window.numpadType('00')">00</button>

      <button class="numpad-btn" onclick="window.numpadType('0')">0</button>
      <button class="numpad-btn" onclick="window.numpadType('000')">000</button>
      <button class="numpad-btn done" style="grid-column: span 2;" onclick="window.closeCustomNumpad()">完 了</button>
    </div>
  </div>

  <div id="reportArea">
    <div class="report-header">
      <div style="display:flex; align-items:center; gap:20px;">
        <div class="report-suits"><span>♠</span><span class="report-red">♥</span><span>♣</span><span class="report-red">♦</span></div>
        <div class="report-title">SESSION REPORT</div>
      </div>
      <div class="report-meta">
        <div id="reportDate">0000年00月00日</div>
        <div>Play Time: <span id="reportTime">00:00:00</span></div>
      </div>
    </div>
    <table class="report-table">
      <thead><tr><th>Rank</th><th>Player</th><th>Entry</th><th>Final Chips</th><th>Score (点)</th><th>Pay</th></tr></thead>
      <tbody id="reportTableBody"></tbody>
    </table>
    <div class="report-footer">
      <div>Total Pay: <span id="reportTotalPay">0</span> (Confirmed)</div>
      <div style="display:flex; align-items:center; gap:10px;">
        <div class="report-suits" style="font-size:16px;"><span>♠</span><span class="report-red">♥</span><span>♣</span><span class="report-red">♦</span></div>
        <div>KEYpro poker Server</div>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getDatabase, ref, set, update, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDWO4bFy5lAHALlnKr32b9TTTXNcNQuIqU",
      authDomain: "keypro-poker-server.firebaseapp.com",
      projectId: "keypro-poker-server",
      storageBucket: "keypro-poker-server.firebasestorage.app",
      messagingSenderId: "953048452758",
      appId: "1:953048452758:web:16aa168ae600cc97e67cb7",
      measurementId: "G-3HVG0EP54D"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // -------------------------
    // タイマー処理
    // -------------------------
    let currentTimerState = { running: false, elapsedSeconds: 0, lastUpdate: Date.now() };
    onValue(ref(db, 'pokerSession/timer'), (snapshot) => {
      const data = snapshot.val();
      if (data) currentTimerState = data;
    });

    function getFormattedTime() {
      let currentElapsed = currentTimerState.elapsedSeconds;
      if (currentTimerState.running) {
        const elapsedSinceUpdate = Math.floor((Date.now() - currentTimerState.lastUpdate) / 1000);
        currentElapsed += elapsedSinceUpdate;
      }
      const h = Math.floor(currentElapsed / 3600);
      const m = Math.floor((currentElapsed % 3600) / 60);
      const s = currentElapsed % 60;
      return (h > 0 ? String(h).padStart(2, '0') + ':' : '') + String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
    }

    setInterval(() => { document.getElementById('controlTimer').innerText = getFormattedTime(); }, 1000);

    window.timerAction = function(action) {
      let newState = { ...currentTimerState };
      if (action === 'start' && !newState.running) {
        newState.running = true; newState.lastUpdate = Date.now();
      } else if (action === 'stop' && newState.running) {
        newState.running = false; newState.elapsedSeconds += Math.floor((Date.now() - newState.lastUpdate) / 1000);
      } else if (action === 'reset') {
        if(!confirm("タイマーを0にリセットしますか？")) return;
        newState.running = false; newState.elapsedSeconds = 0; newState.lastUpdate = Date.now();
      }
      update(ref(db, 'pokerSession/timer'), newState);
    };

    // -------------------------
    // カスタム電卓（テンキー）処理
    // -------------------------
    let activeNumpadInput = null;
    let activeNumpadOriginal = "";

    window.openCustomNumpad = function(el) {
      if (activeNumpadInput) { window.closeCustomNumpad(); }
      
      activeNumpadInput = el;
      activeNumpadOriginal = el.value; // 元の数字を保存
      el.value = ""; // ★ タップしたら既存の数字は消える
      
      el.classList.add('numpad-active');
      document.getElementById('numpadOverlay').classList.add('show');
      document.getElementById('customNumpad').classList.add('show');
      window.calculate(); // 空に書き換えた状態で計算
    };

    window.closeCustomNumpad = function() {
      if (!activeNumpadInput) return;
      
      // ★ 記載がない場合（空っぽの場合）は既存の数字を復活
      if (activeNumpadInput.value === "") {
        activeNumpadInput.value = activeNumpadOriginal; 
      }
      
      activeNumpadInput.classList.remove('numpad-active');
      activeNumpadInput = null;
      document.getElementById('numpadOverlay').classList.remove('show');
      document.getElementById('customNumpad').classList.remove('show');
      window.calculate();
    };

    window.numpadType = function(val) {
      if (!activeNumpadInput) return;
      activeNumpadInput.value += val;
      window.calculate();
    };

    window.numpadDel = function() {
      if (!activeNumpadInput) return;
      activeNumpadInput.value = activeNumpadInput.value.slice(0, -1);
      window.calculate();
    };

    window.numpadClear = function() {
      if (!activeNumpadInput) return;
      activeNumpadInput.value = "";
      window.calculate();
    };


    // -------------------------
    // 精算・同期処理
    // -------------------------
    const STARTING_CHIPS = 20000;
    const RATE = 10;
    const INITIAL_ROWS = 5;
    let isFirstLoad = true;

    function formatNumber(num) { return num.toLocaleString(); }

    onValue(ref(db, 'pokerSession/players'), (snapshot) => {
      const draftData = snapshot.val();
      const tableBody = document.getElementById('tableBody');
      
      if (!draftData && isFirstLoad) {
        tableBody.innerHTML = '';
        for (let i = 0; i < INITIAL_ROWS; i++) { tableBody.appendChild(window.createRow()); }
        isFirstLoad = false;
        window.calculate(); 
        return;
      }
      isFirstLoad = false;
      const data = draftData || [];

      while(tableBody.children.length < data.length) { tableBody.appendChild(window.createRow()); }
      while(tableBody.children.length > data.length) { tableBody.lastChild.remove(); }

      let totalPaySum = 0;

      data.forEach((p, index) => {
         const row = tableBody.children[index];
         const nameInput = row.querySelector('.name-input');
         const entryInput = row.querySelector('.entry');
         const chipsInput = row.querySelector('.final-chips');
         
         // 自分が入力中のセル以外を更新（名前は通常のOSキーボード、他はカスタムキーパッド）
         if (document.activeElement !== nameInput) {
             nameInput.value = p.name || "";
         }
         // ★ カスタム電卓で入力中のセルは上書きしない
         if (entryInput !== activeNumpadInput) {
             entryInput.value = p.entry !== undefined ? p.entry : 1;
         }
         if (chipsInput !== activeNumpadInput) {
             chipsInput.value = p.finalChips !== undefined ? p.finalChips : 0;
         }

         const entry = parseFloat(entryInput.value) || 0;
         const finalChips = parseFloat(chipsInput.value) || 0;
         const result = finalChips - (entry * STARTING_CHIPS);
         const pay = result / RATE;

         row.querySelector('.result').value = formatNumber(result);
         row.querySelector('.pay').value = formatNumber(pay);
         totalPaySum += pay;
      });

      document.getElementById('totalPay').innerText = formatNumber(totalPaySum);
      const msg = document.getElementById('statusMessage');
      if (totalPaySum === 0) {
        msg.innerText = "✨ 確認済 (誤差なし)"; msg.className = "summary match";
      } else {
        msg.innerText = `⚠️ エラー: ${totalPaySum > 0 ? '+' : ''}${formatNumber(totalPaySum)} のズレ`; msg.className = "summary error";
      }
    });

    window.calculate = function() {
      const rows = document.querySelectorAll('#tableBody tr');
      let totalPaySum = 0;
      let draftData = []; 

      rows.forEach(row => {
        const name = row.querySelector('.name-input').value; 
        const entry = parseFloat(row.querySelector('.entry').value) || 0;
        const finalChips = parseFloat(row.querySelector('.final-chips').value) || 0;
        
        const result = finalChips - (entry * STARTING_CHIPS);
        const pay = result / RATE;

        row.querySelector('.result').value = formatNumber(result);
        row.querySelector('.pay').value = formatNumber(pay);
        totalPaySum += pay;
        draftData.push({ name, entry, finalChips });
      });

      document.getElementById('totalPay').innerText = formatNumber(totalPaySum);
      const msg = document.getElementById('statusMessage');
      if (totalPaySum === 0) {
        msg.innerText = "✨ 確認済 (誤差なし)"; msg.className = "summary match";
      } else {
        msg.innerText = `⚠️ エラー: ${totalPaySum > 0 ? '+' : ''}${formatNumber(totalPaySum)} のズレ`; msg.className = "summary error";
      }
      set(ref(db, 'pokerSession/players'), draftData);
    };

    window.createRow = function(name = "", entry = 1, finalChips = 0) {
      const tr = document.createElement('tr');
      // ★ エントリーと最終持ち点は readonly にし、クリックでカスタム電卓を開く
      tr.innerHTML = `
        <td data-label="名前"><input type="text" class="name-input" placeholder="プレイヤー名" value="${name}" oninput="window.calculate()"></td>
        <td data-label="エントリー"><input type="text" class="entry numpad-trigger" value="${entry}" readonly onclick="window.openCustomNumpad(this)"></td>
        <td data-label="最終持ち点"><input type="text" class="final-chips numpad-trigger" value="${finalChips}" readonly onclick="window.openCustomNumpad(this)"></td>
        <td data-label="精算後 (点)"><input type="text" class="result readonly" value="-20,000" readonly tabindex="-1"></td>
        <td data-label="Pay"><input type="text" class="pay readonly" value="-2,000" readonly tabindex="-1"></td>
        <td data-label=""><button class="del-btn" onclick="window.removeRow(this)">✖ 削除</button></td>
      `;
      return tr;
    };

    window.addRow = function() {
      document.getElementById('tableBody').appendChild(window.createRow());
      window.calculate();
    };

    window.removeRow = function(btn) {
      btn.closest('tr').remove();
      window.calculate(); 
    };

    window.confirmAndSave = function() {
      const rows = document.querySelectorAll('#tableBody tr');
      let playerData = [];
      let hasName = false;
      const currentPlayTime = getFormattedTime();

      rows.forEach(row => {
        const name = row.querySelector('.name-input').value.trim();
        if (name !== "") {
          hasName = true;
          const entry = parseFloat(row.querySelector('.entry').value) || 0;
          const finalChips = parseFloat(row.querySelector('.final-chips').value) || 0;
          const result = finalChips - (entry * STARTING_CHIPS);
          const pay = result / RATE;
          playerData.push({ name, entry, finalChips, result, pay, playTime: currentPlayTime });
        }
      });

      if (!hasName) { alert("プレイヤー名が入力されていません。"); return; }

      let checkTotal = 0;
      playerData.forEach(p => checkTotal += p.pay);
      if (checkTotal !== 0) {
        if (!confirm("合計Payにズレがあります。このまま記録しますか？")) return;
      } else {
        if (!confirm("本日の成績を確定し、画像を生成して記録しますか？")) return;
      }

      const btn = document.getElementById('saveBtn');
      btn.innerText = "⏳ 処理中..."; btn.disabled = true;

      prepareReportArea(playerData, currentPlayTime);
      const reportArea = document.getElementById('reportArea');
      
      setTimeout(() => {
        html2canvas(reportArea, { scale: 2, useCORS: true, backgroundColor: null }).then(canvas => {
          const jpegUrl = canvas.toDataURL('image/jpeg', 0.9); 
          const now = new Date();
          const dateStr = now.getFullYear() + String(now.getMonth() + 1).padStart(2, '0') + String(now.getDate()).padStart(2, '0');
          const fileName = `poker_result_${dateStr}.jpg`;

          const link = document.createElement('a');
          link.href = jpegUrl; link.download = fileName; link.click();

          sendToGAS(playerData, btn);
        });
      }, 500);
    };

    function prepareReportArea(data, playTime) {
      const now = new Date();
      document.getElementById('reportDate').innerText = now.getFullYear() + "年" + (now.getMonth() + 1) + "月" + now.getDate() + "日";
      document.getElementById('reportTime').innerText = playTime;

      const sortedData = [...data].sort((a, b) => b.pay - a.pay);
      const tbody = document.getElementById('reportTableBody');
      tbody.innerHTML = '';
      let totalPay = 0;

      sortedData.forEach((player, index) => {
        totalPay += player.pay;
        const tr = document.createElement('tr');
        const payClass = player.pay > 0 ? 'report-plus' : (player.pay < 0 ? 'report-minus' : '');
        const paySign = player.pay > 0 ? '+' : '';

        tr.innerHTML = `
          <td style="font-weight:bold; font-size:20px;">${index + 1}</td>
          <td class="name-cell">${player.name}</td>
          <td>${player.entry}</td>
          <td>${formatNumber(player.finalChips)}</td>
          <td class="${payClass}">${paySign}${formatNumber(player.result)}</td>
          <td class="pay-cell ${payClass}">${paySign}${formatNumber(player.pay)}</td>
        `;
        tbody.appendChild(tr);
      });
      document.getElementById('reportTotalPay').innerText = formatNumber(totalPay);
    }

    function sendToGAS(playerData, btn) {
      const GAS_URL = "https://script.google.com/macros/s/AKfycbxijPOgmKGDL-UL5eAqOBKrxKVfPl4v6hsdLcWbiuwMrCWSPI5fqxu3qOmXIFTrMYCi5A/exec";
      fetch(GAS_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(playerData) })
      .then(() => {
        alert("✨ 成績をスプレッドシートに記録しました。\n本日もお疲れ様でした！");
        btn.innerText = "💾 成績を確定・記録する"; btn.disabled = false;
        
        if(confirm("画面とタイマーをリセットして次のゲーム（または次回）の準備をしますか？")) {
          set(ref(db, 'pokerSession/players'), []); 
          update(ref(db, 'pokerSession/timer'), { running: false, elapsedSeconds: 0, lastUpdate: Date.now() });
          location.reload();
        }
      }).catch(error => {
        alert("通信エラーが発生しました。");
        btn.innerText = "💾 成績を記録する"; btn.disabled = false;
      });
    }
  </script>
</body>
</html>
