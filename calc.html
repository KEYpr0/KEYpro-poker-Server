<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>総合ランキング - KEYpro poker</title>
<style>
  *, *::before, *::after { box-sizing: border-box; }

  body, button, h1, h2, p, div { font-family: 'KEYpro', sans-serif; }
  /* VIPルームのような漆黒のグラデーション */
  body { background: radial-gradient(circle at top center, #2a2a2a 0%, #050505 100%); color: #ffffff; text-align: center; margin: 0; min-height: 100vh; padding: 40px 20px; overflow-x: hidden; }
  
  .container { max-width: 800px; margin: 0 auto; position: relative; }
  
  /* 豪華なヘッダー */
  .crown-icon { font-size: 40px; margin-bottom: -10px; display: inline-block; animation: float 3s ease-in-out infinite; }
  h1 { font-size: 38px; margin: 10px 0 5px 0; letter-spacing: 4px; background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c); -webkit-background-clip: text; color: transparent; text-shadow: 0px 4px 15px rgba(212, 175, 55, 0.3); }
  p.subtitle { font-size: 15px; color: #a0a0a0; margin-bottom: 40px; letter-spacing: 2px; }
  
  @keyframes float {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-8px); }
    100% { transform: translateY(0px); }
  }

  /* ローディングアニメーション */
  #loading { font-size: 18px; color: #d4af37; margin: 50px 0; font-weight: bold; letter-spacing: 2px; }
  .spinner { display: inline-block; width: 30px; height: 30px; border: 3px solid rgba(212, 175, 55, 0.3); border-radius: 50%; border-top-color: #d4af37; animation: spin 1s ease-in-out infinite; vertical-align: middle; margin-right: 10px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ランキングリストの大枠 */
  .ranking-board { display: flex; flex-direction: column; gap: 15px; width: 100%; text-align: left; }

  /* 各プレイヤーのカード（基本デザイン） */
  .rank-card { display: flex; align-items: center; justify-content: space-between; background: linear-gradient(145deg, #1e1e1e, #121212); border: 1px solid #333; padding: 15px 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); transition: transform 0.3s; }
  .rank-card:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.7); }

  /* 🥇 1位の絶対王者デザイン */
  .rank-card.rank-1 { background: linear-gradient(145deg, #2a2100, #141000); border: 1px solid #f1c40f; box-shadow: 0 8px 30px rgba(241, 196, 15, 0.25); transform: scale(1.05); margin: 20px 0 30px 0; padding: 25px 30px; position: relative; overflow: hidden; }
  .rank-card.rank-1::after { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0) 100%); transform: rotate(45deg); animation: shine 4s infinite; }
  @keyframes shine { 0% { left: -100%; } 20% { left: 100%; } 100% { left: 100%; } }

  /* 🥈 2位・🥉 3位のデザイン */
  .rank-card.rank-2 { background: linear-gradient(145deg, #1a1a24, #0d0d12); border: 1px solid #bdc3c7; margin-bottom: 20px; box-shadow: 0 6px 20px rgba(189, 195, 199, 0.15); }
  .rank-card.rank-3 { background: linear-gradient(145deg, #24150d, #120a06); border: 1px solid #cd7f32; margin-bottom: 25px; box-shadow: 0 6px 20px rgba(205, 127, 50, 0.15); }

  /* カード内の要素（順位） */
  .rank-col { font-size: 24px; font-weight: bold; width: 70px; color: #888; text-align: center; }
  .rank-1 .rank-col { font-size: 42px; color: #f1c40f; text-shadow: 0 0 15px rgba(241,196,15,0.6); }
  .rank-2 .rank-col { font-size: 32px; color: #bdc3c7; text-shadow: 0 0 10px rgba(189,195,199,0.5); }
  .rank-3 .rank-col { font-size: 28px; color: #cd7f32; text-shadow: 0 0 10px rgba(205,127,50,0.5); }

  /* カード内の要素（名前・参加回数） */
  .info-col { flex-grow: 1; padding-left: 20px; }
  .player-name { font-size: 20px; font-weight: bold; color: #fff; letter-spacing: 1px; }
  .games-count { font-size: 13px; color: #888; margin-top: 4px; }
  
  .rank-1 .player-name { font-size: 28px; color: #f1c40f; }
  .rank-2 .player-name { font-size: 24px; color: #bdc3c7; }
  .rank-3 .player-name { font-size: 22px; color: #cd7f32; }
  .rank-1 .games-count { color: #d4af37; }

  /* カード内の要素（金額） */
  .pay-col { font-size: 24px; font-weight: bold; text-align: right; }
  .rank-1 .pay-col { font-size: 36px; }
  .rank-2 .pay-col { font-size: 30px; }
  .rank-3 .pay-col { font-size: 28px; }

  .pay-col.plus { color: #2ecc71; text-shadow: 0 0 10px rgba(46,204,113,0.3); }
  .pay-col.minus { color: #e74c3c; text-shadow: 0 0 10px rgba(231,76,60,0.3); }
  .pay-col.zero { color: #a0a0a0; }

  /* 戻るボタン */
  .btn-back { display: inline-block; background: transparent; color: #a0a0a0; border: 1px solid #555; padding: 15px 40px; font-size: 16px; cursor: pointer; border-radius: 50px; margin-top: 50px; text-decoration: none; transition: all 0.3s; letter-spacing: 2px; }
  .btn-back:hover { background: rgba(255,255,255,0.1); color: #fff; border-color: #fff; }

  /* 📱 スマホ画面の調整 */
  @media screen and (max-width: 600px) {
    body { padding: 30px 10px; }
    h1 { font-size: 28px; letter-spacing: 2px; }
    .rank-card { padding: 15px 15px; }
    .rank-card.rank-1 { transform: scale(1.02); margin: 15px 0 20px 0; padding: 20px 15px; }
    
    .rank-col { width: 50px; font-size: 20px; }
    .rank-1 .rank-col { font-size: 32px; }
    .rank-2 .rank-col { font-size: 26px; }
    .rank-3 .rank-col { font-size: 24px; }
    
    .info-col { padding-left: 10px; }
    .player-name { font-size: 16px; }
    .rank-1 .player-name { font-size: 22px; }
    .rank-2 .player-name { font-size: 18px; }
    .rank-3 .player-name { font-size: 18px; }
    
    .pay-col { font-size: 18px; }
    .rank-1 .pay-col { font-size: 26px; }
    .rank-2 .pay-col { font-size: 22px; }
    .rank-3 .pay-col { font-size: 20px; }
  }
</style>
</head>
<body>

  <div class="container">
    <div class="crown-icon">👑</div>
    <h1>HALL OF FAME</h1>
    <p class="subtitle">KEYpro poker 総合ランキング</p>

    <div id="loading">
      <div class="spinner"></div> 集計データを取得中...
    </div>

    <div class="ranking-board" id="rankingBoard" style="display: none;">
      </div>

    <a href="index.html" class="btn-back">◀ ダッシュボードに戻る</a>
  </div>

<script>
  // GASのAPIから全期間のデータを取得
  const GAS_URL = "https://script.google.com/macros/s/AKfycbxijPOgmKGDL-UL5eAqOBKrxKVfPl4v6hsdLcWbiuwMrCWSPI5fqxu3qOmXIFTrMYCi5A/exec";

  window.onload = () => {
    fetch(GAS_URL)
      .then(response => response.json())
      .then(data => {
        const loading = document.getElementById('loading');
        const board = document.getElementById('rankingBoard');
        
        loading.style.display = 'none';
        
        if (!data || data.length === 0) {
          board.style.display = 'block';
          board.innerHTML = '<div style="color: #a0a0a0; margin-top: 30px;">まだ記録がありません。</div>';
          return;
        }

        board.style.display = 'flex';
        let html = '';

        data.forEach((player, index) => {
          let rankStr = (index + 1);
          let rankClass = "rank-other";
          
          if (index === 0) { rankStr = "1"; rankClass = "rank-1"; }
          else if (index === 1) { rankStr = "2"; rankClass = "rank-2"; }
          else if (index === 2) { rankStr = "3"; rankClass = "rank-3"; }

          let payClass = player.pay > 0 ? "plus" : (player.pay < 0 ? "minus" : "zero");
          // カンマ区切りのフォーマット（例： +25,000）
          let formattedPay = player.pay.toLocaleString();
          let payText = player.pay > 0 ? "+" + formattedPay : formattedPay;

          html += `
            <div class="rank-card ${rankClass}">
              <div class="rank-col">${rankStr}</div>
              <div class="info-col">
                <div class="player-name">${player.name}</div>
                <div class="games-count">参加回数: ${player.games} 回</div>
              </div>
              <div class="pay-col ${payClass}">${payText} <span style="font-size: 0.6em; color: #888;">円</span></div>
            </div>
          `;
        });
        
        board.innerHTML = html;
      })
      .catch(error => {
        document.getElementById('loading').innerHTML = '<span style="color:#e74c3c;">データの読み込みに失敗しました。</span>';
      });
  };
</script>
</body>
</html>
