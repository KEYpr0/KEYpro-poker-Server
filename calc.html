<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>チップ精算管理 - KEYpro poker Server</title>
<style>
  /* 管理者向けシンプル＆フラットデザイン */
  body, input, button, table, th, td, h2, div { font-family: 'KEYpro', sans-serif; }
  body { background-color: #121212; color: #e0e0e0; padding: 15px; margin: 0; min-height: 100vh; }
  .container { max-width: 900px; margin: 0 auto; background-color: #1e1e1e; padding: 25px 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
  
  h2 { color: #ffffff; margin-top: 0; margin-bottom: 20px; font-size: 20px; border-bottom: 2px solid #333; padding-bottom: 10px; font-weight: normal; letter-spacing: 1px; }

  /* タイマーコントロールパネル */
  .timer-control { background-color: #252525; border: 1px solid #333; border-radius: 6px; padding: 15px; margin-bottom: 25px; display: flex; flex-direction: column; align-items: center; }
  .timer-control-title { color: #aaa; font-size: 12px; margin-bottom: 10px; }
  .timer-display-small { font-family: 'Courier New', monospace; font-size: 32px; font-weight: bold; color: #4cd137; margin-bottom: 15px; }
  .timer-btns { display: flex; gap: 10px; width: 100%; justify-content: center; }
  .t-btn { padding: 10px 20px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; color: #fff; font-size: 14px; flex: 1; max-width: 120px; }
  .btn-start { background-color: #0097e6; }
  .btn-stop { background-color: #e1b12c; }
  .btn-reset { background-color: #718093; }

  /* テーブルスタイル（PC向け） */
  .table-wrapper { width: 100%; margin-bottom: 20px; overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; background-color: #1e1e1e; }
  th, td { border-bottom: 1px solid #333; padding: 12px 8px; text-align: center; }
  th { color: #aaa; font-size: 12px; font-weight: normal; white-space: nowrap; }
  
  /* 入力欄（プロ仕様） */
  input { width: 100%; padding: 10px; box-sizing: border-box; text-align: right; font-size: 16px; border: 1px solid #444; border-radius: 4px; background-color: #2f3640; color: #fff; transition: border 0.2s; }
  input:focus { border-color: #0097e6; outline: none; background-color: #353b48; }
  input[type="text"].name-input { text-align: left; }
  .readonly { background-color: transparent; border: none; font-weight: bold; color: #dcdde1; text-align: right; padding-right: 0; }
  
  /* 操作ボタン */
  .del-btn { background-color: #c23616; color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; white-space: nowrap; }
  .del-btn:hover { background-color: #e84118; }
  
  .btn { background-color: #2f3640; color: white; border: 1px solid #444; padding: 12px 20px; font-size: 14px; cursor: pointer; border-radius: 4px; margin-top: 10px; display: block; width: 100%; }
  .btn:hover { background-color: #353b48; }
  
  /* サマリー（合計確認エリア） */
  .summary { margin-top: 25px; font-size: 18px; font-weight: bold; color: #fff; background-color: #252525; padding: 15px; border-radius: 6px; border: 1px solid #333; text-align: left; display: flex; justify-content: space-between; align-items: center; }
  .match { color: #4cd137; font-size: 14px; font-weight: normal; }
  .error { color: #e84118; font-size: 14px; font-weight: normal; }
  
  /* 保存ボタンなど */
  .save-btn { background-color: #44bd32; color: #fff; border: none; font-size: 16px; padding: 15px; margin-top: 20px; font-weight: bold; }
  .save-btn:hover { background-color: #4cd137; }
  .save-btn:disabled { background-color: #718093; cursor: not-allowed; }
  .back-btn { background-color: transparent; border: 1px solid #555; margin-top: 15px; color: #aaa; }
  .draft-notice { font-size: 12px; color: #7f8fa6; margin-top: 10px; text-align: center; }

  /* 📱 スマホ向け（高密度・入力特化のリストビュー） */
  @media screen and (max-width: 600px) {
    body { padding: 5px; }
    .container { padding: 15px 10px; }
    
    table, thead, tbody, tr, td { display: block; width: 100%; }
    thead { display: none; }
    
    /* 1人分のブロック */
    tr { background-color: #252525; margin-bottom: 12px; border-radius: 6px; border: 1px solid #333; padding: 12px 12px 40px 12px; position: relative; }
    
    /* セルを横並びのグリッドのように配置 */
    td { padding: 4px 0; border: none; display: flex; align-items: center; justify-content: space-between; }
    td::before { content: attr(data-label); color: #888; font-size: 12px; width: 35%; }
    
    input { width: 65%; padding: 10px; font-size: 16px; /* iOSのズーム防止 */ }
    input[type="text"].name-input { text-align: left; }
    
    /* PayとResultの表示エリア */
    td:nth-child(4), td:nth-child(5) { padding: 2px 0; }
    .readonly { text-align: right; font-size: 15px; padding-right: 5px; }

    /* 削除ボタンを右下に小さく配置 */
    td:last-child { position: absolute; bottom: 10px; right: 12px; padding: 0; display: block; }
    td:last-child::before { display: none; }
    .del-btn { padding: 5px 10px; font-size: 12px; background-color: transparent; color: #c23616; border: 1px solid #c23616; }
    
    .timer-btns .t-btn { padding: 12px 5px; }
    .summary { flex-direction: column; align-items: flex-start; gap: 5px; }
  }
</style>
</head>
<body>

  <div class="container">
    <h2>チップ精算ダッシュボード</h2>

    <div class="timer-control">
      <div class="timer-control-title">プレイ時間タイマー (全画面連動)</div>
      <div id="controlTimer" class="timer-display-small">00:00</div>
      <div class="timer-btns">
        <button class="t-btn btn-start" onclick="window.timerAction('start')">START</button>
        <button class="t-btn btn-stop" onclick="window.timerAction('stop')">STOP</button>
        <button class="t-btn btn-reset" onclick="window.timerAction('reset')">RESET</button>
      </div>
    </div>

    <div class="table-wrapper">
      <table id="calcTable">
        <thead>
          <tr>
            <th>プレイヤー名</th>
            <th>エントリー</th>
            <th>最終持ち点</th>
            <th>精算後 (点)</th>
            <th>Pay (円)</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="tableBody">
        </tbody>
      </table>
    </div>

    <button class="btn" onclick="window.addRow()">+ プレイヤー行を追加</button>

    <div class="summary" id="checkResult">
      <div>合計 Pay: <span id="totalPay">0</span></div>
      <div id="statusMessage" class="match">確認済 (誤差なし)</div>
    </div>
    
    <div class="draft-notice">入力内容はクラウドへ自動同期されています</div>

    <button class="btn save-btn" id="saveBtn" onclick="window.saveData()">成績を確定・記録する</button>
    <button class="btn back-btn" onclick="location.href='index.html'">トップページへ戻る</button>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getDatabase, ref, set, update, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDWO4bFy5lAHALlnKr32b9TTTXNcNQuIqU",
      authDomain: "keypro-poker-server.firebaseapp.com",
      projectId: "keypro-poker-server",
      storageBucket: "keypro-poker-server.firebasestorage.app",
      messagingSenderId: "953048452758",
      appId: "1:953048452758:web:16aa168ae600cc97e67cb7",
      measurementId: "G-3HVG0EP54D"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // -------------------------
    // タイマー処理
    // -------------------------
    let currentTimerState = { running: false, elapsedSeconds: 0, lastUpdate: Date.now() };

    onValue(ref(db, 'pokerSession/timer'), (snapshot) => {
      const data = snapshot.val();
      if (data) currentTimerState = data;
    });

    function getFormattedTime() {
      let currentElapsed = currentTimerState.elapsedSeconds;
      if (currentTimerState.running) {
        const elapsedSinceUpdate = Math.floor((Date.now() - currentTimerState.lastUpdate) / 1000);
        currentElapsed += elapsedSinceUpdate;
      }
      const h = Math.floor(currentElapsed / 3600);
      const m = Math.floor((currentElapsed % 3600) / 60);
      const s = currentElapsed % 60;
      return (h > 0 ? String(h).padStart(2, '0') + ':' : '') + String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
    }

    setInterval(() => {
      document.getElementById('controlTimer').innerText = getFormattedTime();
    }, 1000);

    window.timerAction = function(action) {
      let newState = { ...currentTimerState };
      
      if (action === 'start' && !newState.running) {
        newState.running = true;
        newState.lastUpdate = Date.now();
      } else if (action === 'stop' && newState.running) {
        newState.running = false;
        const elapsed = Math.floor((Date.now() - newState.lastUpdate) / 1000);
        newState.elapsedSeconds += elapsed;
      } else if (action === 'reset') {
        if(!confirm("タイマーを0にリセットしますか？")) return;
        newState.running = false;
        newState.elapsedSeconds = 0;
        newState.lastUpdate = Date.now();
      }
      update(ref(db, 'pokerSession/timer'), newState);
    };

    // -------------------------
    // 精算処理
    // -------------------------
    const STARTING_CHIPS = 20000;
    const RATE = 10;
    const INITIAL_ROWS = 5;

    function formatK(num) {
      if (num === 0) return "0";
      if (Math.abs(num) >= 1000) return (num / 1000).toString() + "K";
      return num.toString();
    }

    window.calculate = function() {
      const rows = document.querySelectorAll('#tableBody tr');
      let totalPaySum = 0;
      let draftData = []; 

      rows.forEach(row => {
        const name = row.querySelector('.name-input').value.trim();
        const entry = parseFloat(row.querySelector('.entry').value) || 0;
        const finalChips = parseFloat(row.querySelector('.final-chips').value) || 0;
        
        const result = finalChips - (entry * STARTING_CHIPS);
        const pay = result / RATE;

        row.querySelector('.result').value = formatK(result);
        row.querySelector('.pay').value = formatK(pay);

        totalPaySum += pay;
        draftData.push({ name: row.querySelector('.name-input').value, entry, finalChips });
      });

      document.getElementById('totalPay').innerText = formatK(totalPaySum);
      const msg = document.getElementById('statusMessage');
      if (totalPaySum === 0) {
        msg.innerText = "確認済 (誤差なし)";
        msg.className = "match";
      } else {
        msg.innerText = `エラー: ${totalPaySum > 0 ? '+' : ''}${formatK(totalPaySum)} のズレ`;
        msg.className = "error";
      }

      localStorage.setItem('pokerDraft', JSON.stringify(draftData));
      set(ref(db, 'pokerSession/players'), draftData);
    };

    // HTMLの生成（絵文字除去、シンプル化）
    window.createRow = function(name = "", entry = 1, finalChips = 0) {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td data-label="名前"><input type="text" class="name-input" placeholder="名前" value="${name}" oninput="window.calculate()"></td>
        <td data-label="エントリー"><input type="number" class="entry" value="${entry}" min="0" oninput="window.calculate()"></td>
        <td data-label="最終持ち点"><input type="number" class="final-chips" value="${finalChips}" step="100" oninput="window.calculate()"></td>
        <td data-label="精算後 (点)"><input type="text" class="result readonly" value="-20K" readonly tabindex="-1"></td>
        <td data-label="Pay (円)"><input type="text" class="pay readonly" value="-2K" readonly tabindex="-1"></td>
        <td data-label=""><button class="del-btn" onclick="window.removeRow(this)">削除</button></td>
      `;
      return tr;
    };

    window.addRow = function() {
      document.getElementById('tableBody').appendChild(window.createRow());
      window.calculate();
    };

    window.removeRow = function(btn) {
      btn.closest('tr').remove();
      window.calculate(); 
    };

    window.loadDraft = function() {
      const draft = localStorage.getItem('pokerDraft');
      const tableBody = document.getElementById('tableBody');
      tableBody.innerHTML = ''; 
      
      if (draft) {
        const draftData = JSON.parse(draft);
        draftData.forEach(data => {
          tableBody.appendChild(window.createRow(data.name, data.entry, data.finalChips));
        });
        window.calculate(); 
      } else {
        for (let i = 0; i < INITIAL_ROWS; i++) tableBody.appendChild(window.createRow());
        window.calculate();
      }
    };

    window.saveData = function() {
      const GAS_URL = "https://script.google.com/macros/s/AKfycbxijPOgmKGDL-UL5eAqOBKrxKVfPl4v6hsdLcWbiuwMrCWSPI5fqxu3qOmXIFTrMYCi5A/exec";
      const rows = document.querySelectorAll('#tableBody tr');
      let playerData = [];
      let hasName = false;

      const currentPlayTime = getFormattedTime();

      rows.forEach(row => {
        const name = row.querySelector('.name-input').value.trim();
        if (name !== "") {
          hasName = true;
          const entry = parseFloat(row.querySelector('.entry').value) || 0;
          const finalChips = parseFloat(row.querySelector('.final-chips').value) || 0;
          const result = finalChips - (entry * STARTING_CHIPS);
          const pay = result / RATE;
          playerData.push({ name, entry, finalChips, result, pay, playTime: currentPlayTime });
        }
      });

      if (!hasName) { alert("プレイヤー名が入力されていません。"); return; }

      let checkTotal = 0;
      playerData.forEach(p => checkTotal += p.pay);
      if (checkTotal !== 0) {
        if (!confirm("合計Payにズレがあります。このまま記録しますか？")) return;
      }

      const btn = document.getElementById('saveBtn');
      btn.innerText = "通信中...";
      btn.disabled = true;

      fetch(GAS_URL, {
        method: 'POST', mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(playerData)
      }).then(() => {
        alert("記録が完了しました。\nプレイ時間: " + currentPlayTime);
        btn.innerText = "成績を確定・記録する";
        btn.disabled = false;
        if(confirm("画面とタイマーをリセットして次のゲームを開始しますか？")) {
          localStorage.removeItem('pokerDraft');
          set(ref(db, 'pokerSession/players'), []); 
          let newState = { running: false, elapsedSeconds: 0, lastUpdate: Date.now() };
          update(ref(db, 'pokerSession/timer'), newState);
          location.reload();
        }
      }).catch(error => {
        alert("通信エラーが発生しました。");
        btn.innerText = "成績を確定・記録する";
        btn.disabled = false;
      });
    };

    window.onload = window.loadDraft;
  </script>
</body>
</html>
